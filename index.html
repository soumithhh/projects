<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4f46e5', // Indigo 600
                        secondary: '#0ea5e9', // Sky 500
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for a premium feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Reveal animation classes */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Gradient text utility */
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="font-sans bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 transition-colors duration-300 selection:bg-primary selection:text-white antialiased">

    <!-- Navigation (Glassmorphism) -->
    <nav class="fixed top-0 w-full z-50 bg-white/70 dark:bg-slate-950/70 backdrop-blur-lg border-b border-slate-200 dark:border-slate-800 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="#" class="text-xl font-bold tracking-tight flex items-center gap-2 group">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white shadow-lg group-hover:shadow-primary/50 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <span>Projects</span>
            </a>
            
            <div class="flex items-center gap-6">
                <button id="theme-toggle" class="p-2.5 rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors focus:outline-none focus:ring-2 focus:ring-primary text-slate-600 dark:text-slate-300">
                    <!-- Sun Icon (shows in dark mode) -->
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <!-- Moon Icon (shows in light mode) -->
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden flex flex-col items-center justify-center min-h-[80vh] text-center px-4">
        <!-- Background decorative blobs -->
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob dark:bg-primary/10"></div>
        <div class="absolute top-1/3 right-1/4 w-96 h-96 bg-secondary/20 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000 dark:bg-secondary/10"></div>
        
        <div class="relative z-10 max-w-4xl reveal">
            <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold tracking-tight mb-8 leading-tight">
                Welcome to my <br class="hidden md:block" />
                <span class="bg-gradient-to-r from-primary to-secondary text-gradient italic">digital workshop.</span>
            </h1>
            <p class="text-lg md:text-2xl text-slate-600 dark:text-slate-400 mb-10 max-w-3xl mx-auto leading-relaxed">
                This page features a collection of web applications and experimental sites I’ve built and <span class="text-primary dark:text-secondary font-medium italic underline underline-offset-4 decoration-primary/30">"vibecoded"</span> using AI.
            </p>
            <a href="#portfolio" class="inline-flex items-center gap-2 px-8 py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-full font-semibold shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
                Explore My Work
                <svg class="w-5 h-5 animate-bounce mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
            </a>
        </div>
    </header>

    <!-- Portfolio Section -->
    <section id="portfolio" class="py-24 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-6">
            <div class="mb-16 md:mb-24 reveal">
                <h2 class="text-3xl md:text-5xl font-bold mb-4">Selected <span class="text-slate-400 dark:text-slate-500">Works</span></h2>
                <div class="w-20 h-1.5 bg-gradient-to-r from-primary to-secondary rounded-full"></div>
            </div>

            <!-- Grid Container for Projects -->
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 xl:gap-10">
                <!-- Project cards will be injected here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Application Logic -->
    <script>
        // ==========================================
        // 1. UPDATED PROJECT DATA
        // ==========================================
        const projectsData = [
            {
                title: "Positioning Experiment",
                description: "An exploration into advanced layout techniques and relative/absolute positioning concepts.",
                url: "https://soumithhh.github.io/positioning/",
                tags: ["Layout", "CSS", "UI"],
                gradient: "from-indigo-500 to-purple-600"
            },
            {
                title: "2 Lines Story",
                description: "A minimalist narrative interface focusing on brevity and clean typography.",
                url: "https://soumithhh.github.io/2lines/",
                tags: ["Minimalism", "Vibecoded", "Web"],
                gradient: "from-slate-800 to-slate-950"
            },
            {
                title: "F1 Experience",
                description: "A high-octane project dedicated to the speed and precision of Formula 1 racing.",
                url: "https://soumithhh.github.io/f1/",
                tags: ["Racing", "Performance", "Design"],
                gradient: "from-red-600 to-rose-700"
            },
            {
                title: "Trip Planner",
                description: "A digital companion for planning and visualizing your next adventure with ease.",
                url: "https://soumithhh.github.io/trip/",
                tags: ["Travel", "App", "UX"],
                gradient: "from-sky-400 to-blue-600"
            },
            {
                title: "Reading Haven",
                description: "An immersive digital reader designed for focused consumption and deep thought.",
                url: "https://soumithhh.github.io/reading/",
                tags: ["Content", "Reading", "Clean"],
                gradient: "from-emerald-500 to-teal-600"
            }
        ];

        // ==========================================
        // 2. RENDER PROJECTS FUNCTION
        // ==========================================
        function renderProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = ''; // Clear grid before rendering
            
            projectsData.forEach((project, index) => {
                const delay = (index % 3) * 150; 
                const tagsHtml = project.tags.map(tag => 
                    `<span class="px-3 py-1 text-xs font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-full border border-slate-200 dark:border-slate-700">${tag}</span>`
                ).join('');

                const cardHTML = `
                    <div class="reveal group flex flex-col bg-white dark:bg-slate-950 rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl hover:shadow-primary/10 transition-all duration-500 transform hover:-translate-y-2 border border-slate-200 dark:border-slate-800" style="transition-delay: ${delay}ms;">
                        <div class="h-56 w-full relative overflow-hidden bg-gradient-to-br ${project.gradient}">
                            <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 20px 20px;"></div>
                            <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                                <a href="${project.url}" target="_blank" class="w-12 h-12 rounded-full bg-white text-slate-900 flex items-center justify-center transform scale-50 group-hover:scale-100 transition-transform duration-300 ease-out shadow-lg">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                </a>
                            </div>
                        </div>
                        <div class="p-8 flex-grow flex flex-col">
                            <h3 class="text-2xl font-bold mb-3 group-hover:text-primary transition-colors">${project.title}</h3>
                            <p class="text-slate-600 dark:text-slate-400 mb-6 flex-grow leading-relaxed text-sm md:text-base">
                                ${project.description}
                            </p>
                            <div class="flex flex-wrap gap-2 mb-8">
                                ${tagsHtml}
                            </div>
                            <a href="${project.url}" target="_blank" class="inline-flex items-center justify-center w-full gap-2 px-6 py-3.5 bg-slate-50 dark:bg-slate-900 hover:bg-primary hover:text-white dark:hover:bg-primary text-slate-900 dark:text-white rounded-2xl font-semibold transition-all duration-300 border border-slate-200 dark:border-slate-800 hover:border-transparent dark:hover:border-transparent group/btn">
                                Check Website
                                <svg class="w-4 h-4 transform group-hover/btn:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </a>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // ==========================================
        // 3. DARK MODE TOGGLE LOGIC
        // ==========================================
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            lightIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            darkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            darkIcon.classList.toggle('hidden');
            lightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });

        // ==========================================
        // 4. SCROLL ANIMATION
        // ==========================================
        function initScrollAnimations() {
            const reveals = document.querySelectorAll('.reveal');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, {
                threshold: 0.1,
                rootMargin: "0px 0px -50px 0px"
            });

            reveals.forEach(element => observer.observe(element));
        }

        // ==========================================
        // 5. INITIALIZATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            renderProjects();
            setTimeout(initScrollAnimations, 100); 
        });
    </script>
</body>
</html>
